<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Blog</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="{% url 'lista_posts' %}">Mi Blog</a>
        <div>
            {% if user.is_authenticated %}
                <a class="btn btn-outline-light btn-sm" href="{% url 'crear_post' %}">Nuevo post</a>
                <a class="btn btn-outline-light btn-sm" href="{% url 'logout' %}">Salir ({{ user.username }})</a>
            {% else %}
                <a class="btn btn-outline-light btn-sm" href="{% url 'login' %}">Iniciar sesión</a>
                <a class="btn btn-outline-light btn-sm" href="{% url 'registro' %}">Registrarse</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-info">{{ message }}</div>
        {% endfor %}
    {% endif %}

    {% block content %}
    {% endblock %}
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
