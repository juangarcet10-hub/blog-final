{% extends 'posts/base.html' %}

{% block content %}
<h1>Blog</h1>
<div class="row">
    {% for post in posts %}
        <div class="col-md-6 mb-3">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">{{ post.titulo }}</h5>
                    <p class="card-text text-muted">{{ post.fecha_creacion|date:"d/m/Y" }}</p>
                    <a href="{% url 'detalle_post' post.slug %}" class="btn btn-primary btn-sm">Leer más</a>
                </div>
            </div>
        </div>
    {% endfor %}
</div>
{% endblock %}
