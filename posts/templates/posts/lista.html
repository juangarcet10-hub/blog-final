<h1>Blog</h1>

{% if user.is_authenticated %}
    <a href="{% url 'crear_post' %}">Nuevo post</a>
{% else %}
    <a href="{% url 'login' %}">Iniciar sesión</a> |
    <a href="{% url 'registro' %}">Registrarse</a>
{% endif %}

<ul>
  {% for post in posts %}
    <li>
      <a href="{% url 'detalle_post' post.slug %}">{{ post.titulo }}</a>
    </li>
  {% endfor %}
</ul>
