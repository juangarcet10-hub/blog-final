{% extends 'posts/base.html' %}

{% block content %}
<h1>{{ post.titulo }}</h1>
<p class="text-muted">{{ post.fecha_creacion|date:"d/m/Y" }}</p>
<p>{{ post.contenido }}</p>

{% if user == post.autor %}
    <a href="{% url 'editar_post' post.slug %}" class="btn btn-warning btn-sm">Editar</a>
{% endif %}

<a href="{% url 'lista_posts' %}" class="btn btn-secondary btn-sm">Volver</a>
{% endblock %}
